# Default host port is 9002 (9000–9999 range; not 9001 or 9090).
# To use another port in that range, change the left side only, e.g. "9003:8080".
services:
  dashboard:
    build: .
    ports:
      - "9002:8080"
    volumes:
      - dashboard-data:/data
    restart: unless-stopped

volumes:
  dashboard-data:
